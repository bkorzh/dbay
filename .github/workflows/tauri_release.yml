name: Build Tauri release assets

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FRONTEND_DIR: software/gui/frontend
  BACKEND_DIR: software/gui/backend
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      should_build: ${{ steps.validate.outputs.should_build }}
    steps:
      - name: Validate release tag format
        id: validate
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Release tag '$TAG' does not match v*.*.*; skipping workflow."
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_build=false" >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: validate-release-tag
    if: needs.validate-release-tag.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: tauri-macos
            artifact_path: software/gui/frontend/src-tauri/target/release/bundle/dmg/*.dmg
            tauri_bundle_targets: ""
          - os: windows-latest
            artifact_name: tauri-windows
            artifact_path: software/gui/frontend/src-tauri/target/release/bundle/msi/*.msi
            tauri_bundle_targets: ""
          - os: ubuntu-latest
            artifact_name: tauri-linux
            artifact_path: software/gui/frontend/src-tauri/target/release/bundle/deb/*.deb
            tauri_bundle_targets: "deb"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: software/gui/frontend/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Sync backend Python environment with uv
        working-directory: ${{ env.BACKEND_DIR }}
        run: uv sync --locked

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: bun install --frozen-lockfile

      - name: Build app installers with existing build script
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          TAURI_BUNDLE_TARGETS: ${{ matrix.tauri_bundle_targets }}
        run: bun run buildall

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  build-flatpak:
    needs: validate-release-tag
    if: needs.validate-release-tag.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: software/gui/frontend/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux and Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            flatpak \
            flatpak-builder

      - name: Add Flathub remote
        run: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime and SDK
        run: flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - name: Sync backend Python environment with uv
        working-directory: ${{ env.BACKEND_DIR }}
        run: uv sync --locked

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: bun install --frozen-lockfile

      - name: Build Linux bundles required for Flatpak input
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          TAURI_BUNDLE_TARGETS: deb
        run: bun run buildall

      - name: Build Flatpak with existing build script
        working-directory: ${{ env.FRONTEND_DIR }}
        run: bun ./build.ts --flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-flatpak
          path: software/gui/frontend/src-tauri/flatpak/device-bay.flatpak
          if-no-files-found: error

  publish-release-assets:
    needs:
      - validate-release-tag
      - build-tauri
      - build-flatpak
    if: needs.validate-release-tag.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release-tag.outputs.tag }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.flatpak
          fail_on_unmatched_files: true
          overwrite_files: true
